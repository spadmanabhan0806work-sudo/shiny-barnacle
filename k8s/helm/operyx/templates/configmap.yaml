apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "operyx.fullname" . }}-config
  labels:
    {{- include "operyx.labels" . | nindent 4 }}
data:
  TENANT_ID: {{ .Values.config.tenantId | quote }}
  STT_PROVIDER: {{ .Values.config.sttProvider | quote }}
  LLM_PROVIDER: {{ .Values.config.llmProvider | quote }}
  CONFIDENCE_THRESHOLD: {{ .Values.config.confidenceThreshold | quote }}
  AUTH_ENABLED: {{ .Values.config.authEnabled | quote }}
  STORAGE_BACKEND: local
  STORAGE_LOCAL_PATH: /app/data/uploads
