apiVersion: v1
kind: Service
metadata:
  name: {{ include "operyx.fullname" . }}-dashboard
  labels:
    {{- include "operyx.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "operyx.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
