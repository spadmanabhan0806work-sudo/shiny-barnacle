apiVersion: v1
kind: Service
metadata:
  name: {{ include "operyx.fullname" . }}-api
  labels:
    {{- include "operyx.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "operyx.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.port }}
      name: http
