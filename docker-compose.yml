services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: operyx
      POSTGRES_PASSWORD: operyx
      POSTGRES_DB: operyx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operyx -d operyx"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://operyx:operyx@postgres:5432/operyx
      DATABASE_URL_SYNC: postgresql://operyx:operyx@postgres:5432/operyx
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /app/data/uploads
      STT_PROVIDER: mock
      LLM_PROVIDER: mock
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./config:/app/config:ro
      - ./prompts:/app/prompts:ro
      - ./data/stock_symbols:/app/data/stock_symbols:ro
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
